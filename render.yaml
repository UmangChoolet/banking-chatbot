services:
  # Backend - FastAPI
  - type: web
    name: banking-chatbot-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: anthropic
      - key: ANTHROPIC_API_KEY
        sync: false  # Set manually in dashboard
      - key: LLM_MODEL
        value: claude-3-haiku-20240307
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: VECTOR_DB_PATH
        value: /tmp/vector_store
      - key: UPLOAD_DIR
        value: /tmp/uploads
      - key: CHUNK_SIZE
        value: "500"
      - key: TOP_K_RETRIEVAL
        value: "5"
    healthCheckPath: /health
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1

  # Frontend - Static Site
  - type: web
    name: banking-chatbot-frontend
    runtime: static
    region: singapore
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://banking-chatbot-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
