version: "3.9"

services:
  backend:
    build: ./backend
    container_name: banking-chatbot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-anthropic}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-claude-3-haiku-20240307}
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - VECTOR_DB_PATH=/app/data/vector_store
      - UPLOAD_DIR=/app/data/uploads
      - REDIS_URL=${REDIS_URL:-}
    volumes:
      - vector_data:/app/data/vector_store
      - upload_data:/app/data/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:8000/api}
    container_name: banking-chatbot-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  # Optional Redis for session persistence
  # redis:
  #   image: redis:7-alpine
  #   container_name: banking-chatbot-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"

volumes:
  vector_data:
  upload_data:
